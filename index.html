body::before {

}
.header, .page-title-bar, .main { position: relative; z-index: 1; }
.header {
  width: 100%; padding: 16px 32px;
  background: rgba(13,13,15,0.6); border-bottom: 1px solid #1e1e24;
  display: flex; align-items: center; backdrop-filter: blur(8px);
}
.logo {
  font-family: "Unbounded", sans-serif; font-size: 16px; font-weight: 700;
  background: linear-gradient(135deg, #c9a84c 0%, #f5d380 50%, #b8860b 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  letter-spacing: 0.15em; margin-left: auto;
}
.page-title-bar { width: 100%; padding: 10px 32px; text-align: center; }
.page-title-text {
  font-family: "Unbounded", sans-serif; font-size: 14px; font-weight: 600;
  color: rgba(232,228,220,0.85); letter-spacing: 0.06em; text-transform: uppercase;
}
.page-title-text span {
  background: linear-gradient(135deg, #c9a84c, #f5d380);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.main {
  display: flex; width: 100%; max-width: 900px;
  padding: 20px 24px 40px; flex-direction: column; align-items: center; flex: 1;
}
.video-col { width: 100%; display: flex; flex-direction: column; gap: 20px; }
.video-wrap {
  position: relative; padding-top: 56.25%; width: 100%;
  border-radius: 12px; overflow: hidden; background: #111;
  box-shadow: 0 8px 40px rgba(0,0,0,0.6);
}
.video-wrap iframe { position: absolute; top:0; left:0; width:100%; height:100%; border:0; }

/* Timed banner styles */
.banner-container {
  display: none; width: 100%;
  animation: bannerIn 0.4s ease-out;
}
.banner-container.active { display: block; }
.banner-container a { display: block; text-decoration: none; }
.banner-container img {
  width: 100%; border-radius: 12px;
  box-shadow: 0 4px 24px rgba(233, 30, 99, 0.25);
  transition: transform 0.15s, box-shadow 0.15s;
}
.banner-container img:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(233, 30, 99, 0.4);
}
.banner-timer {
  text-align: center; margin-top: 8px;
  font-family: "Golos Text", sans-serif; font-size: 13px;
  color: rgba(232,228,220,0.5);
}
@keyframes bannerIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 900px) {
  .main { padding: 16px; }
  .header { padding: 14px 16px; }
  .page-title-bar { padding: 8px 16px; }
}

<body>

<div class="header">
  <div style="width:8px;height:8px;background:#e63946;border-radius:50%;animation:pulse 1.5s infinite;"></div>
  <style>@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}</style>
  <span class="logo">TALPIS</span>
</div>

<div class="page-title-bar">
  <span class="page-title-text">Интенсив <span>«Деньги или Жизнь»</span>. День 3</span>
</div>

<div class="main">
  <div class="video-col">
    <div class="video-wrap">
      <iframe id="kplayer"
        src="https://kinescope.io/embed/hCTvxwPk7tcWGBSQRzZcrg?autoplay=0"
        allow="autoplay; fullscreen; picture-in-picture; encrypted-media; gyroscope; accelerometer; clipboard-write;"
        allowfullscreen>
      </iframe>
    </div>
    <!-- Баннеры появляются здесь по таймингам видео -->
    <div id="timed-banners"></div>
  </div>
</div>

<script>
// ============================
// Сценарий баннеров (из JSON)
// ============================
var bannerScenario = [
  {timeshift:1159000, image:"https://cdn.bizon365.ru/181751/mirovozzrenka__3_.png", url:"https://leonidtalpis.com/mvs-seminar?utm_source=bizon&utm_campaign=marathon050326&utm_term=web070326", timer:0}
];

var bannerContainer = document.getElementById('timed-banners');
var currentActiveBanner = null;

function formatCountdown(sec) {
  var m = Math.floor(sec / 60);
  var s = sec % 60;
  return (m > 0 ? m + ' мин ' : '') + s + ' сек';
}

function showBannerEl(item, timeLeftSec) {
  currentActiveBanner = item;
  bannerContainer.innerHTML =
    '<div class="banner-container active">' +
      '<a href="' + item.url + '" target="_blank">' +
        '<img src="' + item.image + '" alt="Баннер">' +
      '</a>' +
    '</div>';
}

function hideBannerEl() {
  currentActiveBanner = null;
  bannerContainer.innerHTML = '';
}

function updateCountdown(timeLeftSec) {
  var el = document.getElementById('bl-timer');
  if (el) el.textContent = formatCountdown(timeLeftSec);
}

function evaluateBannersAtTime(currentTimeSec) {
  var currentTimeMs = currentTimeSec * 1000;

  // Найти последнее событие, которое уже должно было сработать
  var active = null;
  for (var i = bannerScenario.length - 1; i >= 0; i--) {
    if (currentTimeMs >= bannerScenario[i].timeshift) {
      active = bannerScenario[i];
      break;
    }
  }

  // Если ничего не найдено или это команда "скрыть"
  if (!active || !active.image || !active.url) {
    if (currentActiveBanner) hideBannerEl();
    return;
  }

  // Проверяем, не истёк ли таймер баннера
  var elapsedSec = (currentTimeMs - active.timeshift) / 1000;
  var timerTotal = parseInt(active.timer) || 0;
  if (timerTotal > 0 && elapsedSec > timerTotal) {
    if (currentActiveBanner) hideBannerEl();
    return;
  }

  var timeLeftSec = Math.max(0, Math.ceil(timerTotal - elapsedSec));

  // Показать новый баннер или обновить обратный отсчёт
  if (!currentActiveBanner || currentActiveBanner.timeshift !== active.timeshift) {
    showBannerEl(active, timeLeftSec);
  } else {
    updateCountdown(timeLeftSec);
  }
}

// ============================
// Инициализация плеера через player.js (Embedly)
// ============================
var iframe = document.getElementById('kplayer');
var player = new playerjs.Player(iframe);

player.on('ready', function() {
  // Слушаем прогресс воспроизведения видео
  player.on('timeupdate', function(data) {
    if (data && typeof data.seconds === 'number') {
      evaluateBannersAtTime(data.seconds);
    }
  });

  // Слушаем перемотку
  player.on('seeked', function(data) {
    if (data && typeof data.seconds === 'number') {
      evaluateBannersAtTime(data.seconds);
    }
  });
});
</script>
